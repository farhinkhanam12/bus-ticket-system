{% extends "base.html" %}
{% block content %}

<h2 class="text-center mb-4 fw-bold">Welcome to Your Dashboard</h2>

<div class="row g-4">

    <div class="col-md-4">
        <div class="card shadow p-4 text-center">
            <h5>Book Ticket</h5>
            <p class="text-muted">Reserve your bus seat easily.</p>
            <a href="/book" class="btn btn-primary w-100">Book Now</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow p-4 text-center">
            <h5>View Bookings</h5>
            <p class="text-muted">Check your ticket history.</p>
            <a href="/view_booking" class="btn btn-success w-100">View</a>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow p-4 text-center">
            <h5>Profile</h5>
            <p class="text-muted">Manage your account settings.</p>
            <a href="/profile" class="btn btn-dark w-100">Manage</a>
        </div>
    </div>

</div>

{% endblock %}
