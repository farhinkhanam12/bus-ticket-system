<!DOCTYPE html>
<html>
<head>
    <title>Bus Ticket System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        .main-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .navbar {
            border-radius: 0 0 20px 20px;
        }

        footer {
            color: white;
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark shadow p-3">
    <div class="container">
        <span class="navbar-brand fw-bold">🚌 Bus Booking System</span>

        <div>
            <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="main-card">
        {% block content %}{% endblock %}
    </div>
</div>

<footer>
    © 2026 Cloud Based Bus Booking System
</footer>

</body>
</html>
